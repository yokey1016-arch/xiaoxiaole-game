<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>软糖消消乐</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:radial-gradient(circle at 18% 16%,rgba(255,255,255,.75) 0 5%,transparent 13%),radial-gradient(circle at 82% 18%,rgba(255,255,255,.62) 0 4%,transparent 12%),radial-gradient(circle at 75% 76%,rgba(255,255,255,.45) 0 6%,transparent 15%),linear-gradient(145deg,#ffd2e7 0%,#fff1c7 34%,#c9f7df 66%,#decaff 100%);color:#6f4b68}
button{border:0;outline:0;font:inherit;cursor:pointer}
.app{position:relative;width:min(100vw,430px);height:100dvh;min-height:620px;margin:0 auto;overflow:hidden;padding:16px 12px max(14px,env(safe-area-inset-bottom))}
.decor{position:absolute;inset:0;pointer-events:none;z-index:0}.cloud{position:absolute;width:84px;height:32px;border-radius:999px;background:rgba(255,255,255,.6);box-shadow:24px -11px 0 4px rgba(255,255,255,.5),48px 1px 0 -2px rgba(255,255,255,.64);animation:float 4.5s ease-in-out infinite}.cloud.one{left:20px;top:82px}.cloud.two{right:44px;bottom:96px;animation-delay:-1.8s}.candy{position:absolute;display:grid;place-items:center;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.5);box-shadow:inset 0 2px 5px rgba(255,255,255,.75),0 8px 18px rgba(190,90,150,.14);font-size:20px;animation:float 4s ease-in-out infinite}.candy.a{right:24px;top:122px}.candy.b{left:24px;bottom:88px;animation-delay:-1.1s}.candy.c{right:70px;bottom:28px;animation-delay:-2.2s}@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(4deg)}}
.screen{position:absolute;inset:0;display:none;padding:18px 12px max(14px,env(safe-area-inset-bottom));z-index:2}.screen.active{display:flex}.start-screen{align-items:center;justify-content:center;text-align:center}.start-card{width:100%;padding:32px 22px 28px;border-radius:32px;background:rgba(255,255,255,.58);box-shadow:inset 0 2px 0 rgba(255,255,255,.9),0 24px 64px rgba(175,90,150,.24);backdrop-filter:blur(12px)}.logo{width:112px;height:88px;margin:0 auto 12px;display:grid;place-items:center;border-radius:42% 42% 35% 35%;background:radial-gradient(circle at 33% 22%,rgba(255,255,255,.9) 0 11%,transparent 12%),linear-gradient(160deg,#ff76b1,#ffc3dd 56%,#fff0a6);box-shadow:inset 0 9px 14px rgba(255,255,255,.42),inset 0 -8px 16px rgba(215,68,135,.18),0 14px 24px rgba(229,100,160,.26);font-size:38px;animation:jelly 2.2s ease-in-out infinite}@keyframes jelly{0%,100%{transform:scale(1)}42%{transform:scale(1.06,.95) translateY(2px)}70%{transform:scale(.97,1.04) translateY(-2px)}}h1{margin:0;font-size:clamp(36px,10vw,44px);color:#ff5d9d;text-shadow:0 3px 0 #fff,0 10px 20px rgba(255,100,160,.22);letter-spacing:0}.subtitle{margin:12px 0 24px;font-size:17px;color:#7a5873}
.primary-btn,.soft-btn{min-height:50px;border-radius:999px;padding:0 24px;font-weight:900;color:#fff;background:linear-gradient(180deg,#ff86bd,#ff5296);box-shadow:inset 0 2px 0 rgba(255,255,255,.58),0 8px 0 #d93f83,0 16px 24px rgba(217,63,131,.22);transition:transform .12s ease,box-shadow .12s ease}.primary-btn:active,.soft-btn:active{transform:translateY(5px);box-shadow:inset 0 2px 0 rgba(255,255,255,.45),0 3px 0 #d93f83,0 10px 18px rgba(217,63,131,.2)}
.game-screen{flex-direction:column;gap:10px}.topbar{position:relative;z-index:3;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{min-height:62px;padding:8px 6px;border-radius:20px;text-align:center;background:rgba(255,255,255,.64);box-shadow:inset 0 2px 0 rgba(255,255,255,.88),0 8px 18px rgba(130,70,120,.12)}.stat span{display:block;margin-bottom:3px;font-size:12px;color:#8a6b82}.stat strong{display:block;font-size:19px;line-height:1.1;color:#ff5b9a}.combo{position:relative;z-index:3;min-height:28px;display:grid;place-items:center;font-size:15px;font-weight:900;color:#8a4c96;text-shadow:0 2px 0 rgba(255,255,255,.68)}.combo.pop{animation:comboPop .45s ease}@keyframes comboPop{0%{opacity:.2;transform:scale(.72)}55%{opacity:1;transform:scale(1.2)}100%{transform:scale(1)}}
.board-shell{position:relative;z-index:3;width:100%;max-width:406px;margin:0 auto;padding:10px;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.42)),linear-gradient(135deg,rgba(255,125,185,.24),rgba(95,225,195,.24));box-shadow:inset 0 2px 0 rgba(255,255,255,.92),0 18px 38px rgba(155,92,148,.2)}.board{position:relative;width:100%;aspect-ratio:1/1;border-radius:22px;overflow:hidden;background:linear-gradient(90deg,rgba(255,255,255,.38) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.38) 1px,transparent 1px),rgba(255,255,255,.34);background-size:calc(100% / 7) calc(100% / 7);box-shadow:inset 0 0 0 2px rgba(255,255,255,.72)}
.tile{position:absolute;display:grid;place-items:center;border-radius:16px;transition:transform .25s cubic-bezier(.2,.9,.2,1.25),opacity .22s ease,filter .2s ease;will-change:transform,opacity;cursor:pointer}.tile-inner{position:relative;width:100%;height:100%;display:grid;place-items:center;overflow:hidden;border-radius:16px;box-shadow:inset 0 3px 4px rgba(255,255,255,.72),inset 0 -8px 11px rgba(80,40,90,.16),0 8px 10px rgba(115,65,120,.16)}.tile-inner::before{content:"";position:absolute;left:16%;top:11%;width:36%;height:18%;border-radius:50%;background:rgba(255,255,255,.72);transform:rotate(-18deg)}.tile-inner::after{content:attr(data-face);position:absolute;left:0;right:0;bottom:9%;text-align:center;font-size:12px;color:rgba(88,45,82,.68)}.symbol{position:relative;z-index:2;font-size:clamp(22px,7vw,31px);transform:translateY(-3px);filter:drop-shadow(0 2px 0 rgba(255,255,255,.58))}.kind-0 .tile-inner{background:linear-gradient(160deg,#ff6f9f,#ffb4ce)}.kind-1 .tile-inner{background:linear-gradient(160deg,#68baff,#b9e0ff)}.kind-2 .tile-inner{background:linear-gradient(160deg,#ffe05c,#fff3a8)}.kind-3 .tile-inner{background:linear-gradient(160deg,#a177ff,#d8c7ff)}.kind-4 .tile-inner{background:linear-gradient(160deg,#ff9e4d,#ffd2a6)}.kind-5 .tile-inner{background:linear-gradient(160deg,#63e1b6,#c0f8dc)}
.tile.selected{z-index:10;filter:drop-shadow(0 0 13px rgba(255,82,158,.82))}.tile.selected .tile-inner{outline:3px solid rgba(255,255,255,.96);animation:selected .55s ease-in-out infinite alternate}@keyframes selected{from{transform:scale(1.04) translateY(0)}to{transform:scale(1.12) translateY(-2px)}}.tile.pop-out .tile-inner{animation:popOut .3s ease forwards}@keyframes popOut{0%{opacity:1;transform:scale(1);filter:brightness(1.15)}45%{opacity:.95;transform:scale(1.18);filter:brightness(1.85)}100%{opacity:0;transform:scale(.12) rotate(22deg);filter:brightness(2.2)}}.tile.born .tile-inner{animation:born .36s cubic-bezier(.2,.9,.2,1.35)}@keyframes born{from{opacity:.15;transform:scale(.12) translateY(-22px)}to{opacity:1;transform:scale(1)}}.tile.shake .tile-inner,.board.shake{animation:shake .34s ease}@keyframes shake{0%,100%{transform:translateX(0)}22%{transform:translateX(-7px) rotate(-3deg)}45%{transform:translateX(7px) rotate(3deg)}68%{transform:translateX(-4px) rotate(-2deg)}}
.particle{position:absolute;z-index:30;width:8px;height:8px;border-radius:50%;pointer-events:none;background:var(--color);animation:particle .6s ease-out forwards}@keyframes particle{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}}.bubble{position:absolute;left:50%;top:46%;z-index:60;padding:8px 16px;border-radius:999px;transform:translate(-50%,-50%);white-space:nowrap;color:#ff4f9a;font-size:24px;font-weight:1000;background:rgba(255,255,255,.86);box-shadow:inset 0 2px 0 rgba(255,255,255,.95),0 8px 20px rgba(180,90,150,.22);animation:bubble .85s ease-out forwards;pointer-events:none}@keyframes bubble{0%{opacity:0;transform:translate(-50%,-20%) scale(.65)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}100%{opacity:0;transform:translate(-50%,-120%) scale(.9)}}
.controls{position:relative;z-index:3;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}.soft-btn{min-height:48px;padding:0 12px;font-size:15px;background:linear-gradient(180deg,#9ddffb,#55bceb);box-shadow:inset 0 2px 0 rgba(255,255,255,.55),0 7px 0 #399bd0,0 13px 18px rgba(57,155,208,.22)}.soft-btn:nth-child(2){background:linear-gradient(180deg,#bfa7ff,#9879ff);box-shadow:inset 0 2px 0 rgba(255,255,255,.55),0 7px 0 #7658d6,0 13px 18px rgba(118,88,214,.2)}
.tip{position:fixed;left:14px;right:14px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:80;max-width:402px;margin:auto;display:none;padding:15px 16px;border-radius:22px;background:rgba(255,255,255,.9);box-shadow:0 12px 30px rgba(120,70,120,.2);color:#74506d;font-size:14px;line-height:1.6}.tip.show{display:block;animation:modalIn .22s ease}.modal-mask{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(100,58,100,.24);backdrop-filter:blur(8px)}.modal-mask.show{display:flex}.modal{width:min(100%,360px);padding:28px 20px 22px;text-align:center;border-radius:32px;background:radial-gradient(circle at 30% 12%,rgba(255,255,255,.9) 0 8%,transparent 18%),linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,246,252,.82));box-shadow:inset 0 2px 0 rgba(255,255,255,.95),0 24px 60px rgba(126,72,126,.32);animation:modalIn .32s cubic-bezier(.2,.9,.2,1.18)}@keyframes modalIn{from{opacity:0;transform:scale(.76) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}.modal h2{margin:0 0 10px;font-size:32px;color:#ff5b9a;text-shadow:0 2px 0 #fff}.modal p{margin:8px 0 16px;color:#75546e;line-height:1.55}.modal .primary-btn{width:100%}.confetti{position:fixed;z-index:120;top:-22px;width:10px;height:16px;border-radius:3px;background:var(--c);pointer-events:none;animation:confetti 1.75s ease-in forwards}@keyframes confetti{to{opacity:0;transform:translateY(110vh) rotate(720deg)}}
@media (max-width:380px){.app{padding-left:10px;padding-right:10px;min-height:600px}.topbar{gap:6px}.stat{min-height:58px;border-radius:17px}.stat strong{font-size:17px}.board-shell{padding:8px}.tile,.tile-inner{border-radius:14px}.soft-btn{min-height:45px;font-size:14px}}
</style>
</head>
<body>
<div class="app">
  <div class="decor"><div class="cloud one"></div><div class="cloud two"></div><div class="candy a">🍬</div><div class="candy b">⭐</div><div class="candy c">💗</div></div>
  <section id="startScreen" class="screen start-screen active"><div class="start-card"><div class="logo">🍓</div><h1>软糖消消乐</h1><div class="subtitle">滑动软糖，轻松摸鱼五分钟</div><button id="startBtn" class="primary-btn">开始游戏</button></div></section>
  <section id="gameScreen" class="screen game-screen">
    <div class="topbar"><div class="stat"><span>分数</span><strong id="scoreText">0</strong></div><div class="stat"><span>目标</span><strong id="targetText">3000</strong></div><div class="stat"><span>步数</span><strong id="movesText">25</strong></div></div>
    <div id="comboText" class="combo">甜甜开局</div>
    <div class="board-shell"><div id="board" class="board"></div></div>
    <div class="controls"><button id="restartBtn" class="soft-btn">重新开始</button><button id="helpBtn" class="soft-btn">玩法说明</button></div>
  </section>
</div>
<div id="tip" class="tip">点击两个相邻棋子，或按住棋子上下左右滑动进行交换。横向或纵向 3 个以上相同棋子会消除，连续消除会触发 Combo 加分。</div>
<div id="modalMask" class="modal-mask"><div class="modal"><h2 id="modalTitle">太棒啦！</h2><p id="modalScore">最终分数：0</p><button id="againBtn" class="primary-btn">再玩一次</button></div></div>
<script>
(()=>{"use strict";const SIZE=7,START_MOVES=25,TARGET_SCORE=3000,SWAP_TIME=260,CLEAR_TIME=320,FALL_TIME=280;const pieces=[{emoji:"🍓",face:"⌒‿⌒",color:"#ff6f9f"},{emoji:"⭐",face:"•ᴗ•",color:"#68baff"},{emoji:"🐻",face:"˘ᴗ˘",color:"#ffe05c"},{emoji:"🐾",face:"｡◕‿◕｡",color:"#a177ff"},{emoji:"🍊",face:"ᵔᴥᵔ",color:"#ff9e4d"},{emoji:"💗",face:"♡‿♡",color:"#63e1b6"}];const $=id=>document.getElementById(id),sleep=ms=>new Promise(r=>setTimeout(r,ms));const els={startScreen:$("startScreen"),gameScreen:$("gameScreen"),startBtn:$("startBtn"),board:$("board"),scoreText:$("scoreText"),targetText:$("targetText"),movesText:$("movesText"),comboText:$("comboText"),restartBtn:$("restartBtn"),helpBtn:$("helpBtn"),tip:$("tip"),modalMask:$("modalMask"),modalTitle:$("modalTitle"),modalScore:$("modalScore"),againBtn:$("againBtn")};let board=[],tileId=1,domMap=new Map,selected=null,locked=false,score=0,moves=START_MOVES,pointerStart=null;function randomType(){return Math.floor(Math.random()*pieces.length)}function createTile(type=randomType()){return{id:tileId++,type,born:true}}function inBounds(r,c){return r>=0&&r<SIZE&&c>=0&&c<SIZE}function key(r,c){return`${r},${c}`}function getCellMetrics(){const width=els.board.clientWidth,gap=width<=360?6:7,size=(width-gap*(SIZE-1))/SIZE;return{size,gap}}function preventStartMatch(r,c,type){return c>=2&&board[r][c-1]?.type===type&&board[r][c-2]?.type===type||r>=2&&board[r-1][c]?.type===type&&board[r-2][c]?.type===type}
function generateBoard(){do{board=Array.from({length:SIZE},()=>Array(SIZE).fill(null));for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){let type,guard=0;do{type=randomType();guard++}while(preventStartMatch(r,c,type)&&guard<50);board[r][c]=createTile(type)}}while(detectMatches().length>0||!hasAvailableMove())}
function createTileNode(tile){const node=document.createElement("div"),data=pieces[tile.type];node.className=`tile kind-${tile.type}`;node.innerHTML=`<div class="tile-inner" data-face="${data.face}"><span class="symbol">${data.emoji}</span></div>`;node.addEventListener("click",e=>{e.preventDefault();handleTap(Number(node.dataset.row),Number(node.dataset.col))});node.addEventListener("pointerdown",e=>{pointerStart={r:Number(node.dataset.row),c:Number(node.dataset.col),x:e.clientX,y:e.clientY}});node.addEventListener("pointerup",e=>{if(!pointerStart||locked)return;const dx=e.clientX-pointerStart.x,dy=e.clientY-pointerStart.y,absX=Math.abs(dx),absY=Math.abs(dy);if(Math.max(absX,absY)>24){const target={r:pointerStart.r,c:pointerStart.c};absX>absY?target.c+=dx>0?1:-1:target.r+=dy>0?1:-1;if(inBounds(target.r,target.c))processSwap(pointerStart,target)}pointerStart=null});return node}
function renderBoard(){const{size,gap}=getCellMetrics(),alive=new Set;for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const tile=board[r][c];if(!tile)continue;alive.add(tile.id);let node=domMap.get(tile.id);if(!node){node=createTileNode(tile);domMap.set(tile.id,node);els.board.appendChild(node)}node.dataset.row=r;node.dataset.col=c;node.style.width=`${size}px`;node.style.height=`${size}px`;node.style.transform=`translate(${c*(size+gap)}px, ${r*(size+gap)}px)`;node.classList.toggle("selected",selected&&selected.r===r&&selected.c===c);if(tile.born){node.classList.add("born");setTimeout(()=>node.classList.remove("born"),380);tile.born=false}}for(const[id,node]of domMap.entries())if(!alive.has(id)){node.remove();domMap.delete(id)}}
function isAdjacent(a,b){return Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1}function handleTap(r,c){if(locked||!inBounds(r,c))return;if(!selected){selected={r,c};renderBoard();return}if(selected.r===r&&selected.c===c){selected=null;renderBoard();return}const first=selected,second={r,c};selected=null;renderBoard();isAdjacent(first,second)?processSwap(first,second):(selected=second,renderBoard())}
function swapTiles(a,b){const temp=board[a.r][a.c];board[a.r][a.c]=board[b.r][b.c];board[b.r][b.c]=temp}
async function processSwap(a,b){if(locked||!isAdjacent(a,b))return;locked=true;swapTiles(a,b);renderBoard();await sleep(SWAP_TIME);const matches=detectMatches();if(matches.length===0){swapTiles(a,b);renderBoard();shakeInvalid(a,b);vibrate(30);await sleep(SWAP_TIME+120);locked=false;return}moves--;await resolveCascade();updateScoreAndMoves();checkWinLose();locked=false}
function shakeInvalid(a,b){els.board.classList.add("shake");[a,b].forEach(pos=>{const tile=board[pos.r][pos.c],node=tile&&domMap.get(tile.id);if(node)node.classList.add("shake")});setTimeout(()=>{els.board.classList.remove("shake");document.querySelectorAll(".tile.shake").forEach(node=>node.classList.remove("shake"))},360)}
function detectMatches(){const groups=[];for(let r=0;r<SIZE;r++){let start=0;for(let c=1;c<=SIZE;c++){const same=c<SIZE&&board[r][c]&&board[r][start]&&board[r][c].type===board[r][start].type;if(!same){const len=c-start;if(len>=3)groups.push({cells:Array.from({length:len},(_,i)=>({r,c:start+i})),length:len});start=c}}}for(let c=0;c<SIZE;c++){let start=0;for(let r=1;r<=SIZE;r++){const same=r<SIZE&&board[r][c]&&board[start][c]&&board[r][c].type===board[start][c].type;if(!same){const len=r-start;if(len>=3)groups.push({cells:Array.from({length:len},(_,i)=>({r:start+i,c})),length:len});start=r}}}return groups}
async function clearMatches(matches,combo){const clearMap=new Map;let extra=0;matches.forEach(group=>{group.cells.forEach(cell=>clearMap.set(key(cell.r,cell.c),cell));if(group.length>=4)extra+=(group.length-3)*80});for(const cell of clearMap.values()){const tile=board[cell.r][cell.c];if(!tile)continue;const node=domMap.get(tile.id);if(node)node.classList.add("pop-out");createParticles(cell.r,cell.c,pieces[tile.type].color);board[cell.r][cell.c]=null}const count=clearMap.size;score+=Math.floor(count/3)*100*combo+extra*combo;if(combo>1)showCombo(combo);updateScoreAndMoves();vibrate(18);await sleep(CLEAR_TIME);for(const[id,node]of domMap.entries())if(node.classList.contains("pop-out")){node.remove();domMap.delete(id)}}
function createParticles(r,c,color){const{size,gap}=getCellMetrics(),cx=c*(size+gap)+size/2,cy=r*(size+gap)+size/2;for(let i=0;i<8;i++){const p=document.createElement("span"),angle=Math.PI*2*i/8+Math.random()*.4,distance=22+Math.random()*28;p.className="particle";p.style.left=`${cx}px`;p.style.top=`${cy}px`;p.style.setProperty("--dx",`${Math.cos(angle)*distance}px`);p.style.setProperty("--dy",`${Math.sin(angle)*distance}px`);p.style.setProperty("--color",i%2?color:"#fff3a0");els.board.appendChild(p);setTimeout(()=>p.remove(),650)}}
async function dropTiles(){for(let c=0;c<SIZE;c++){const stack=[];for(let r=SIZE-1;r>=0;r--)if(board[r][c])stack.push(board[r][c]);for(let r=SIZE-1;r>=0;r--)board[r][c]=stack[SIZE-1-r]||null}renderBoard();await sleep(FALL_TIME)}
async function fillNewTiles(){for(let c=0;c<SIZE;c++)for(let r=0;r<SIZE;r++)if(!board[r][c])board[r][c]=createTile();renderBoard();await sleep(240)}
async function resolveCascade(){let combo=1;while(true){const matches=detectMatches();if(matches.length===0)break;setComboText(combo>1?`Combo x${combo} 甜甜连消！`:"消除成功！");await clearMatches(matches,combo);await dropTiles();await fillNewTiles();combo++}setComboText("继续滑动软糖吧");if(!hasAvailableMove()){setComboText("没有可走步，正在重排");await sleep(350);regeneratePlayableBoard()}}
function showCombo(combo){const bubble=document.createElement("div");bubble.className="bubble";bubble.textContent=`Combo x${combo}`;els.board.appendChild(bubble);setTimeout(()=>bubble.remove(),900)}function setComboText(text){els.comboText.textContent=text;els.comboText.classList.remove("pop");void els.comboText.offsetWidth;els.comboText.classList.add("pop")}function updateScoreAndMoves(){els.scoreText.textContent=score;els.targetText.textContent=TARGET_SCORE;els.movesText.textContent=moves}function checkWinLose(){if(score>=TARGET_SCORE)endGame(true);else if(moves<=0)endGame(false)}function endGame(win){locked=true;els.modalTitle.textContent=win?"太棒啦！":"差一点点！";els.modalScore.textContent=`最终分数：${score}`;els.againBtn.textContent=win?"再玩一次":"重新挑战";setTimeout(()=>{els.modalMask.classList.add("show");if(win)launchConfetti()},450)}
function launchConfetti(){const colors=["#ff72ad","#fff071","#7ce5bd","#74c3ff","#b994ff","#ffad5e"];for(let i=0;i<48;i++){const piece=document.createElement("span");piece.className="confetti";piece.style.left=`${Math.random()*100}vw`;piece.style.animationDelay=`${Math.random()*.45}s`;piece.style.setProperty("--c",colors[i%colors.length]);document.body.appendChild(piece);setTimeout(()=>piece.remove(),2200)}}
function hasAvailableMove(){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const dirs=[[0,1],[1,0]];for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc;if(!inBounds(nr,nc))continue;swapTiles({r,c},{r:nr,c:nc});const ok=detectMatches().length>0;swapTiles({r,c},{r:nr,c:nc});if(ok)return true}}return false}
