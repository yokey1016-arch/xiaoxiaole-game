<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffd2e8">
  <title>软糖消消乐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" id="app">
    <div class="decor" aria-hidden="true">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="float-sweet sweet-a">🍬</span>
      <span class="float-sweet sweet-b">⭐</span>
      <span class="float-sweet sweet-c">💗</span>
      <span class="float-sweet sweet-d">🍭</span>
    </div>

    <section class="screen start-screen is-active" id="startScreen">
      <div class="start-card">
        <div class="logo-jelly" aria-hidden="true">🍓</div>
        <h1>软糖消消乐</h1>
        <p>滑动软糖，轻松摸鱼五分钟</p>
        <button class="primary-btn" id="startBtn" type="button">开始游戏</button>
      </div>
    </section>

    <section class="screen game-screen" id="gameScreen">
      <header class="hud" aria-label="游戏状态">
        <div class="hud-item">
          <span>分数</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-item">
          <span>目标</span>
          <strong id="targetText">3000</strong>
        </div>
        <div class="hud-item">
          <span>步数</span>
          <strong id="movesText">25</strong>
        </div>
      </header>

      <div class="combo-line" id="comboText">甜甜开局</div>

      <section class="board-frame" aria-label="7 x 7 消消乐棋盘">
        <div class="board" id="board"></div>
      </section>

      <footer class="toolbar">
        <button class="soft-btn" id="restartBtn" type="button">重新开始</button>
        <button class="soft-btn purple" id="helpBtn" type="button">玩法说明</button>
      </footer>
    </section>
  </main>

  <div class="modal-mask" id="helpModal" aria-hidden="true">
    <div class="modal">
      <h2>玩法说明</h2>
      <p>滑动相邻软糖交换位置。</p>
      <p>三个及以上相同软糖连成一线即可消除。</p>
      <p>达到目标分数即可通关。</p>
      <button class="primary-btn" id="closeHelpBtn" type="button">知道啦</button>
    </div>
  </div>

  <div class="modal-mask" id="resultModal" aria-hidden="true">
    <div class="modal result-modal">
      <div class="result-icon" id="resultIcon">✨</div>
      <h2 id="resultTitle">太棒啦！</h2>
      <p id="resultScore">最终分数：0</p>
      <button class="primary-btn" id="againBtn" type="button">再玩一次</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
